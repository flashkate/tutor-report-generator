<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Резюме тьюторской · Zerocoder</title>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<style>

:root {
  --bg:          #0d0d14;
  --surface:     #16162a;
  --surface-2:   #1e1e35;
  --border:      #2a2a4a;
  --primary:     #7c3aed;
  --primary-h:   #6d28d9;
  --primary-lt:  #ede9fe;
  --text:        #e2e8f0;
  --muted:       #94a3b8;
  --green:       #22c55e;
  --yellow:      #eab308;
  --red:         #ef4444;
  --r:           12px;
  --r-sm:        8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-inner {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 22px; }
.logo-name { font-size: 17px; font-weight: 700; }
.logo-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }
.counter {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
}
.counter .val { color: var(--green); font-weight: 600; }

/* ── MAIN ── */
main {
  max-width: 820px;
  margin: 0 auto;
  padding: 28px 24px 80px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 22px;
}
.card-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--muted);
  display: block;
  margin-bottom: 12px;
}

/* ── SETTINGS ── */
.settings-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--muted);
  font-size: 13px;
  padding: 7px 14px;
  cursor: pointer;
  transition: all .2s;
}
.settings-toggle:hover { border-color: var(--primary); color: var(--primary-lt); }
.settings-panel {
  margin-top: 10px;
  padding: 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
}
.settings-panel label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 7px; }
.api-row { display: flex; gap: 8px; }
.api-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-size: 14px;
  font-family: monospace;
  padding: 9px 13px;
  outline: none;
  transition: border-color .2s;
}
.api-row input:focus { border-color: var(--primary); }
.btn-sm {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-size: 13px;
  padding: 9px 16px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn-sm:hover { border-color: var(--primary); color: var(--primary-lt); }
.hint { font-size: 11px; color: var(--muted); margin-top: 8px; opacity: .7; }

/* ── FILE DROP ZONE ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--r-sm);
  padding: 36px 24px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  margin-bottom: 14px;
  position: relative;
}
.drop-zone:hover,
.drop-zone.drag-over { border-color: var(--primary); background: rgba(124,58,237,.06); }
.drop-zone.has-file  { border-style: solid; border-color: var(--green); background: rgba(34,197,94,.05); }
.drop-icon { font-size: 32px; margin-bottom: 10px; display: block; }
.drop-label { font-size: 15px; font-weight: 500; color: var(--text); }
.drop-hint  { font-size: 12px; color: var(--muted); margin-top: 6px; }
.drop-file  { font-size: 13px; color: var(--green); margin-top: 10px; font-weight: 500; }
#file-input { display: none; }

/* ── BUTTONS ── */
.btn-primary {
  width: 100%;
  background: var(--primary);
  border: none;
  border-radius: var(--r-sm);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  padding: 13px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .02em;
}
.btn-primary:hover:not(:disabled) {
  background: var(--primary-h);
  transform: translateY(-1px);
  box-shadow: 0 4px 22px rgba(124,58,237,.45);
}
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }

/* ── RESULT ── */
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.btn-copy {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--muted);
  font-size: 13px;
  padding: 6px 13px;
  cursor: pointer;
  transition: all .2s;
}
.btn-copy:hover { border-color: var(--primary); color: var(--primary-lt); }
.btn-copy.ok   { border-color: var(--green);   color: var(--green); }

.result-body { font-size: 15px; line-height: 1.72; }
.result-body h2 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin: 20px 0 8px;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
}
.result-body h2:first-child { margin-top: 0; }
.result-body h3 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; color: var(--primary-lt); }
.result-body ul { padding-left: 20px; margin: 6px 0; }
.result-body li { margin: 4px 0; }
.result-body p  { margin: 7px 0; }
.result-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.result-body strong { color: var(--primary-lt); }

/* ── LOADING OVERLAY ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(13,13,20,.93);
  backdrop-filter: blur(7px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 30px;
  padding: 24px;
}
.spinner {
  width: 50px;
  height: 50px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .85s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-phrase {
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  text-align: center;
  max-width: 440px;
  min-height: 54px;
  transition: opacity .35s;
}

/* ── CONFETTI ── */
#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 200;
  display: none;
}

/* ── RED FLAG ── */
#red-flag {
  position: fixed;
  top: -130px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 72px;
  z-index: 200;
  filter: drop-shadow(0 4px 24px rgba(239,68,68,.7));
}
@keyframes flagDrop {
  0%   { top: -130px; opacity: 1; }
  22%  { top: 26px; }
  32%  { top: 20px; transform: translateX(-50%) rotate(-9deg); }
  42%  { top: 26px; transform: translateX(-50%) rotate(9deg); }
  52%  { top: 20px; transform: translateX(-50%) rotate(-5deg); }
  62%  { top: 26px; transform: translateX(-50%) rotate(5deg); }
  72%  { top: 22px; transform: translateX(-50%) rotate(0deg); opacity: 1; }
  100% { top: -150px; opacity: 0; }
}
.flag-drop { animation: flagDrop 3.6s ease-in-out forwards; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 16px;
  font-size: 13px;
  color: var(--muted);
  z-index: 300;
  transform: translateY(70px);
  opacity: 0;
  transition: all .3s;
  max-width: 320px;
}
.toast.show    { transform: translateY(0); opacity: 1; }
.toast.show.ok { border-color: var(--green); color: var(--green); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header { padding: 11px 16px; }
  main   { padding: 18px 14px 60px; }
  .logo-name { font-size: 14px; }
  .counter   { font-size: 12px; padding: 5px 10px; }
}

</style>
</head>

<script>
'use strict';

// ── SYSTEM PROMPT (SKILL.md → с раздела "# Tutor-Report-Generator") ───────────

const SYSTEM_PROMPT = `# Tutor-Report-Generator

Ты помогаешь тьютору Zerocoder генерировать краткое резюме по итогам
тьюторской встречи со студентом. Резюме публикуется во внутренний рабочий Telegram-чат,
чтобы коллеги, которые дальше сопровождают студента, сразу понимали контекст и что за студента будут сопровождать, а также какие персональные договоренности с этим студентом были.

## Контекст программы

Zerocoder — онлайн-университет. Тьютор ведёт онлайн вводные встречи с VIP-студентами
трёх программ:
- **AI-консалтинг** — запуск AI-агентства под ключ (автоматизация на N8N, вайбкодинг,
  промпт-инжиниринг, продажи)
- **AI-студия** — схожая программа, фокус на разработке AI-продуктов
На этой встрече тьютор рассказывает о возможностях программы и условиях обучения, а также при необходимости делает индивидуальный маршрут обучения и отвечает на вопросы студента.

Обучение: 6-12 месяцев на обучение в зависимости от темпа + 1 год на окупаемость. Гарантия возврата денег при выполнении всех условий. Поддержка: VIP-менеджер, тьютор, кураторы, эксперты-наставники,
психолог, юрист, бухгалтер.

## Шаги выполнения

### Шаг 1 — Извлеки имя студента

- **Имя студента**: тьютор несколько раз обращается к студенту по имени в течение
  встречи, особенно в начале при знакомстве. Найди имя собеседника.

### Шаг 2 — Проанализируй транскрипцию и сформируй резюме

Резюме состоит из четырёх блоков:

---

#### Блок 1 — Мини-резюме

1-2 предложения. Кто студент, какой бэкграунд, зачем пришёл на программу. Это первое, что читает вип-менеджер — должно быть ёмко и по делу.

---

#### Блок 2 — Квалификация студента 🟢/🟡/🔴

Определи цвет на основе анализа транскрипции:

**🟢 Крутыш** — студент подходит для программы:
- Есть бэкграунд в IT, технологиях, разработке, автоматизации
- Есть опыт в предпринимательстве, фрилансе, управлении проектами
- Реалистичные ожидания по срокам и заработку
- Достаточно времени на обучение (от 10 часов в неделю и больше)
- Задаёт конструктивные вопросы

**🟡 Середнячок** — студент под вопросом, нужно внимание:
- Слабый технический бэкграунд, далёк от IT
- Мало понимает, что такое бизнес или предпринимательство
- Рекомендовано предобучение (нейросети, программирование)
- В целом мотивирован, но есть пробелы или сомнения

**🔴 Рэээд флаааг!** — тревожные сигналы:
- Завышенные ожидания: хочет зарабатывать через 2-3 месяца и миллионных заработков в итоге
- Мало времени на обучение (менее 10 часов в неделю)
- Неадекватные или каверзные вопросы, агрессия, недоверие к программе
- Ждёт быстрых результатов, при этом нет опыта в IT и бизнесе

После цвета напиши 1-2 предложения с пояснением: почему именно этот цвет,
что конкретно в транскрипции это подтверждает.

---

#### Блок 3 — Договорённости со студентом

Выпиши конкретные договорённости из встречи, если они были, 1-2 предложения:
- Какой курс подключить дополнительно или какой модуль открыть сразу
- Нужно ли предобучение и какое именно
- Особый образовательный маршрут (если обсуждался)
- Любые индивидуальные условия или договорённости
- Конкретные действия, которые нужно сделать после встречи, если они есть
- Важные моменты, требующие внимания: юридический вопрос, нестандартная ситуация,
  срочный запрос и т.д.

Если особых договоренностей не было, то так и пиши: особых договоренностей нет

---

## Формат выходного текста

## 📝 Мини-резюме тьюторской
[1-2 предложения]
## [ЦВЕТ-ЭМОДЗИ] [Крутыш / Середнячок / Ред флаг]
[Цвет]: [пояснение почему]
## 🤝 Договорённости
[договорённости или «особых договорённостей нет»]
---

## Важные правила

- Тьютор — не студент. Имя студента — это собеседник, не тот кто ведёт встречу.
- Будь объективен в квалификации: опирайся только на факты из транскрипции, не додумывай.
- Если в транскрипции мало информации по какому-то блоку — напиши «не обсуждалось».
- Резюме пишется в нейтральном деловом тоне, без воды и лишних слов.
- Текст только на русском языке.
- Не называй вип-менеджера по имени — всегда пиши просто «вип-менеджер»
- Весь отчёт должен умещаться в 10-20 строк. Будь максимально лаконичен и краток`;

// ── КОНСТАНТЫ ─────────────────────────────────────────────────────────────────

const LOADING_PHRASES = [
  'Читаю транскрипцию... делаю вид, что внимательно слушаю',
  'Ищу красные флаги... надеюсь не найти',
  'Анализирую студента на расстоянии — так безопаснее',
  'Взвешиваю ожидания студента... весы немного накренились',
  'Считаю часы на обучение в неделю... математика не врёт',
  'Расшифровываю кофейную гущу... то есть транскрипцию',
  'Консультируюсь с внутренним методистом...',
  'Пишу отчёт вместо тебя, как и договорились',
];


// ── STATE ─────────────────────────────────────────────────────────────────────

let phraseTimer = null;
let toastTimer = null;
let transcriptText = '';

// ── INIT ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('trg_api_key');
  if (saved) document.getElementById('api-key').value = saved;
  updateCounter();
});

// ── SETTINGS ──────────────────────────────────────────────────────────────────

function toggleSettings() {
  const p = document.getElementById('settings-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function saveApiKey() {
  const key = document.getElementById('api-key').value.trim();
  if (!key) return;
  localStorage.setItem('trg_api_key', key);
  showToast('API-ключ сохранён', true);
}

// ── COUNTER ───────────────────────────────────────────────────────────────────

function updateCounter() {
  const n = parseInt(localStorage.getItem('trg_count') || '0');
  document.getElementById('saved-time').textContent = (n * 10) + ' мин';
  const el = document.getElementById('saved-count');
  if (n > 0) {
    const word = n % 10 === 1 && n % 100 !== 11 ? 'встреча'
               : [2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100) ? 'встречи'
               : 'встреч';
    el.textContent = `(${n} ${word})`;
  } else {
    el.textContent = '';
  }
}

function incrementCounter() {
  const n = parseInt(localStorage.getItem('trg_count') || '0') + 1;
  localStorage.setItem('trg_count', String(n));
  updateCounter();
}


// ── FILE HANDLING ─────────────────────────────────────────────────────────────

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}

function handleDragLeave(e) {
  document.getElementById('drop-zone').classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

async function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['txt', 'docx'].includes(ext)) {
    showToast('Поддерживаются только .txt и .docx', false);
    return;
  }
  try {
    if (ext === 'txt') {
      transcriptText = await readTxt(file);
    } else {
      transcriptText = await readDocx(file);
    }
    const zone = document.getElementById('drop-zone');
    zone.classList.add('has-file');
    document.getElementById('drop-icon').textContent = '✅';
    document.getElementById('drop-label').textContent = 'Файл загружен';
    document.getElementById('drop-file').textContent = file.name;
  } catch (e) {
    showToast('Ошибка чтения файла: ' + e.message, false);
  }
}

function readTxt(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsText(file, 'utf-8');
  });
}

function readDocx(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
        resolve(result.value);
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// ── GENERATE ──────────────────────────────────────────────────────────────────

async function generate() {
  const apiKey = (localStorage.getItem('trg_api_key') || document.getElementById('api-key').value).trim();

  if (!apiKey) {
    showToast('Введите API-ключ в настройках', false);
    document.getElementById('settings-panel').style.display = 'block';
    return;
  }
  if (!transcriptText) {
    showToast('Загрузите файл транскрипции', false);
    return;
  }
  const transcript = transcriptText;

  showLoading(true);
  document.getElementById('gen-btn').disabled = true;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: transcript }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const result = data.content[0].text;

    showLoading(false);
    renderResult(result);
    triggerAnimation(result);
    incrementCounter();

  } catch (e) {
    showLoading(false);
    showToast('Ошибка: ' + e.message, false);
  } finally {
    document.getElementById('gen-btn').disabled = false;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function renderResult(text) {
  document.getElementById('result-body').innerHTML = mdToHtml(text);
  const card = document.getElementById('result-card');
  card.style.display = 'block';
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

function mdToHtml(text) {
  const lines = text.split('\n');
  const out = [];
  let inList = false;

  for (const raw of lines) {
    const line = raw;
    if (/^## /.test(line)) {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<h2>' + fmt(esc(line.slice(3))) + '</h2>');
    } else if (/^### /.test(line)) {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<h3>' + fmt(esc(line.slice(4))) + '</h3>');
    } else if (/^#### /.test(line)) {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<h3>' + fmt(esc(line.slice(5))) + '</h3>');
    } else if (/^- /.test(line)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + fmt(esc(line.slice(2))) + '</li>');
    } else if (/^---$/.test(line.trim())) {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<hr>');
    } else if (line.trim() === '') {
      if (inList) { out.push('</ul>'); inList = false; }
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push('<p>' + fmt(esc(line)) + '</p>');
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

// ── ANIMATIONS ────────────────────────────────────────────────────────────────

function triggerAnimation(text) {
  if (text.includes('🟢')) launchConfetti();
  else if (text.includes('🔴')) launchRedFlag();
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  const colors = ['#7c3aed','#22c55e','#eab308','#3b82f6','#f97316','#ec4899','#06b6d4'];
  const particles = Array.from({ length: 200 }, () => ({
    x:     Math.random() * canvas.width,
    y:     -10 - Math.random() * 120,
    w:     7 + Math.random() * 9,
    h:     3 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    speed: 2 + Math.random() * 4,
    angle: Math.random() * Math.PI * 2,
    spin:  (Math.random() - .5) * .18,
    drift: (Math.random() - .5) * 2.2,
  }));
  const end = Date.now() + 4500;

  (function draw() {
    const now = Date.now();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const fade = Math.min(1, (end - now) / 1000);
    particles.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.angle += p.spin;
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (now < end) {
      requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
    }
  })();
}

function launchRedFlag() {
  const el = document.getElementById('red-flag');
  el.classList.remove('flag-drop');
  void el.offsetWidth;
  el.classList.add('flag-drop');
  el.addEventListener('animationend', () => el.classList.remove('flag-drop'), { once: true });
}

// ── LOADING ───────────────────────────────────────────────────────────────────

function showLoading(show) {
  const overlay = document.getElementById('overlay');
  if (show) {
    overlay.style.display = 'flex';
    let i = 0;
    const el = document.getElementById('loading-phrase');
    el.textContent = LOADING_PHRASES[0];
    phraseTimer = setInterval(() => {
      i = (i + 1) % LOADING_PHRASES.length;
      el.style.opacity = '0';
      setTimeout(() => { el.textContent = LOADING_PHRASES[i]; el.style.opacity = '1'; }, 320);
    }, 2300);
  } else {
    overlay.style.display = 'none';
    if (phraseTimer) { clearInterval(phraseTimer); phraseTimer = null; }
  }
}

// ── COPY ──────────────────────────────────────────────────────────────────────

function copyResult() {
  const body = document.getElementById('result-body');
  const parts = [];
  let inDeal = false;

  for (const node of body.childNodes) {
    const tag = node.tagName?.toLowerCase();
    if (!tag) continue;

    if (tag === 'h2' || tag === 'h3') {
      const text = node.textContent.trim();
      if (parts.length > 0) parts.push('');
      parts.push(text);
      inDeal = text.includes('Договорённости');
    } else if (tag === 'p') {
      const text = node.textContent.trim();
      if (!text) continue;
      if (inDeal) {
        toSentences(text).forEach(s => parts.push('- ' + s));
      } else {
        parts.push(text);
      }
    } else if (tag === 'ul') {
      for (const li of node.querySelectorAll('li')) {
        parts.push('- ' + li.textContent.trim());
      }
    }
    // <hr> не копируем
  }

  navigator.clipboard.writeText(parts.join('\n')).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Скопировано';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '📋 Скопировать'; btn.classList.remove('ok'); }, 2200);
  });
}

function toSentences(text) {
  return text.split(/(?<=[.!?])\s+/).map(s => s.trim()).filter(Boolean);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────

function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (ok ? ' ok' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3200);
}
